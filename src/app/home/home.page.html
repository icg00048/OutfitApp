<ion-content> 
  <ion-searchbar
    slot="fixed"
    [(ngModel)]="searchTerm"
    placeholder="Search…"
    debounce="300"
    class="fixed-search">
  </ion-searchbar>
  <div *ngIf="!isLoading && filteredItems.length" class="masonry-container">
    <div class="masonry-item" *ngFor="let item of filteredItems">
      <app-item-card [item]="item"></app-item-card>
    </div>
  </div>
</ion-content>
